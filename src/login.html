<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log In</title>
    </head>
    <body>
        <form action="dashboard.html">
            <table border="1px black solid">
                <thead>
                    <tr>
                        <th scope="col" colspan="2">Log In</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <th>Email</th>
                        <th width="150px">
                            <input type="text"/>
                        </th>
                    </tr>
                    <tr>
                        <th>Password</th>
                        <th width="150px">
                            <input type="text"/>
                        </th>
                    </tr>
                    <tr>
                        <th colspan="2" align="right">
                            <button>Log In</button>
                        </th>
                    </tr>
                </tbody>
            </table>
        </form>
        <p>Don't have an account? Register <a href="register.html">here!</a></p>
    </body>
</html>
