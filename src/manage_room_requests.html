<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Requests</title>
    <link rel="stylesheet" media="all" type="text/css" href="css/style.css" />
    <script src="js/nav_constructor.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>
<body>
    <nav></nav>
    	<div class="main aligned col-flex">
			<div class="container center aligned shadow">
					<p>Search ID number: </p>
					<input type="text">
				
					<p>Filter Room</p>
					<select>
						<option>G301</option>
						<option>G302</option>
						<option>G303</option>
						<option>G304</option>
						<option>G305</option>
					</select>
			</div>

			<div class="box">
				<h2>Current Reservations</h2>
				<div class="gapped col-flex">
					<table id = "reservationTable">
						<tr>
							<th align="left">Name</th>
                            <th align="left">Date</th>
                            <th align="left">Time</th>
                            <th align="left">Room</th>
                            <th align="left">Status</th>
                            <th align="left">Actions</th>
						</tr>
					</table>
			</div>
    	</div>

	</div>
    <script>
        let list = [
            ["Tiam-Lee, T.", "3/1", "1200-1300", "G404", "Finished"],
            ["Lim-Cheng, N.", "2/2", "1200-1300", "G404", "Canceled"],
            ["Fernandez, A.", "4/9", "1200-1300", "G404", "Pending"],
            ["Caronongan, A.", "4/10", "1200-1300", "G404", "Pending"],
            ["Tan, P.", "4/11", "1200-1300", "G404", "Canceled"],
        ]

        function listReservations() {
            let table = document.querySelector("#reservationTable");

            list.forEach((x, i) => {
                let row = document.createElement("tr");

                x.forEach((y, index) => {
                    let col = document.createElement("td");
                    let container = document.createElement("div");
                    

                    if (index == 0) {
                        container.className = "cells profile-div left-justify";
                        let img = document.createElement("img");
                        let img_link = document.createElement("a");

                        img.className = "mini-profile"
                        img.setAttribute("src", "img/profile_icon.png");

                        img_link.setAttribute("href", "other_profile.html");

                        img_link.appendChild(img);

                        let name = document.createElement("a");
                        name.setAttribute("href", "other_profile.html");
                        name.textContent = y;

                        container.appendChild(name);
                        container.appendChild(img_link);
                    }
                    else {
                        container.className = "cells left-justify";
                        container.textContent = y;
                    }

                    col.appendChild(container);
                    row.appendChild(col);
                });

				let div = document.createElement("td");
                // div.className = "cells";

                let button = document.createElement("button");
                button.textContent = "Cancel";
				button.id = "cancel-btn";
                button.onclick = () => deleteReservation(i);

                div.appendChild(button);
                row.appendChild(div);

                table.appendChild(row);
            });
        }

        function deleteReservation(i){
            chosenReservation = "room " + list[i][3] + " - " + list[i][1] + " - " + list[i][2];
            if (confirm("Are you sure you want to cancel your reservation at " + chosenReservation + "?") == true) {
                alert("Reservation at " + chosenReservation + " cancelled!")
                list.splice(i,1);
                document.getElementById("reservationTable").innerHTML = "";
                listReservations();
            } else {
            }


        }

        listReservations();
    </script>
</body>
</html>
