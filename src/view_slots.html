<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Slot</title>
    <link rel="stylesheet" media="all" type="text/css" href="css/style.css" />
    <script src="js/nav_constructor.js" defer></script>
    <script src="js/admin_reservation.js" defer></script>
    <script src="js/input_checker.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

</head>

<body>
    <nav></nav>
    <!-- this is for lab technician view for in person reservations -->
    
    <div id="inperson-reserve" class="modal">
        <div class="modal-content">
            <h2 class="modal-h2">Confirm Reservation</h2>
            <form onsubmit="return false;">
                <table>
                    <tr>
                        <td class="modal-td">First Name</td>
                        <td class="modal-td"><input class="modal-input" type="text" id="input-first" placeholder="Enter first name here..."></td>
                    </tr>
                    <tr>
                        <td class="modal-td">Last Name</td>
                        <td class="modal-td"><input class="modal-input" type="text" id="input-last" placeholder="Enter last name here..."></td>
                    </tr>
                    <tr>
                        <td class="modal-td">Email</td>
                        <td class="modal-td"><input class="modal-input" type="text" id="input-email" placeholder="Enter email here..."></td>
                    </tr>
                    <tr>
                        <td class="modal-td">ID Number</td>
                        <td class="modal-td"><input class="modal-input" type="text" id="input-id" placeholder="Enter ID number here..."></td>
                    </tr>
                    <tr>
                        <td>
                            <input type="button" id="cancel" onclick="hideModal()" value="Cancel">
                            <input type="submit" value="Confirm" onclick="inpersonReserve();hideModal();">
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>

    <div class="main gapped aligned col-flex">
        <div class="container center aligned">
            <p>Room</p>

            <select id="select-room">
                <option>GK203</option>
            </select>

            <p>Day</p>

            <select id="select-day">
                <option>2026/06/07</option>
            </select>

            <p>Start Time</p>
            <select id="select-start-time">
                <option>7:00 AM</option>
                <option>7:30 AM</option>
                <option>8:00 AM</option>
                <option>8:30 AM</option>
                <option>9:00 AM</option>
                <option>9:30 AM</option>
                <option>10:00 AM</option>
                <option>10:30 AM</option>
                <option>11:00 AM</option>
                <option>11:30 AM</option>
                <option>12:00 PM</option>
                <option>12:30 PM</option>
                <option>1:00 PM</option>
                <option>1:30 PM</option>
                <option>2:00 PM</option>
                <option>2:30 PM</option>
                <option>3:00 PM</option>
                <option>3:30 PM</option>
                <option>4:00 PM</option>
                <option>4:30 PM</option>
                <option>5:00 PM</option>
                <option>5:30 PM</option>
                <option>6:00 PM</option>
                <option>6:30 PM</option>
                <option>7:00 PM</option>
            </select>

            <p>End Time</p>
            <select id="select-end-time">
                <option>7:30 AM</option>
                <option>8:00 AM</option>
                <option>8:30 AM</option>
                <option>9:00 AM</option>
                <option>9:30 AM</option>
                <option>10:00 AM</option>
                <option>10:30 AM</option>
                <option>11:00 AM</option>
                <option>11:30 AM</option>
                <option>12:00 PM</option>
                <option>12:30 PM</option>
                <option>1:00 PM</option>
                <option>1:30 PM</option>
                <option>2:00 PM</option>
                <option>2:30 PM</option>
                <option>3:00 PM</option>
                <option>3:30 PM</option>
                <option>4:00 PM</option>
                <option>4:30 PM</option>
                <option>5:00 PM</option>
                <option>5:30 PM</option>
                <option>6:00 PM</option>
                <option>6:30 PM</option>
                <option>7:00 PM</option>
                <option>7:30 PM</option>
            </select>

        </div>

        <div class="container center">
            <div class="box" id="seat-list"></div>
            <div id="reserve-box">
                <div class="box" id="reserve-list-box">
                    <p class="seat-title" id="confirmed-text">CONFIRMED RESERVATIONS</p>
                    <div id="reserve-list">

                    </div>
                </div>
            <button id="reserve-btn" type="button">Reserve</button>
            </div> 
        </div>
        
    </div>
</body>

</html>
