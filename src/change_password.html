<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" media="all" type="text/css" href="css/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <script src="js/nav_constructor.js" defer></script>
    <script type="module" src="js/input_checker.js" defer></script>
</head>

<body>
    <nav></nav>
    
    <div class="main">
        <h1>Change Password</h1>
        <p>Change the password of your account</p>
        <div class="container col-flex center aligned">
            <form action="profile_settings.html" onsubmit="return checkInputs() && confirmPassword()">
                <table>
                    <tr>
                        <th align="left">Old Password</th>
                        <td width="150px">
                            <input type="text" />
                        </td>
                    </tr>

                    <tr>
                        <th align="left">New Password</th>
                        <td width="150px">
                            <input class="confirm-password" type="text" />
                        </td>
                    </tr>

                    <tr>
                        <th align="left">Confirm Password</th>
                        <td width="150px">
                            <input class="confirm-password" type="text" />
                        </td>
                    </tr>

                    <tr>
                        <th colspan="2" align="right">
                            <input type="submit" value="Submit">
                        </th>
                    </tr>
                </table>
            </form>
        </div>
    </div>
</body>

</html>
