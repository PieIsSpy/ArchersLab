<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form>
            <table border="1px black solid">
                <thead>
                    <tr>
                        <th scope="col" colspan="2">Register User</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <th>First Name</th>
                        <th width="150px">
                            <input type="text"/>
                        </th>
                    </tr>

                    <tr>
                        <th>Last Name</th>
                        <th width="150px">
                            <input type="text"/>
                        </th>
                    </tr>

                    <tr>
                        <th>Email</th>
                        <th width="150px">
                            <input type="text"/>
                        </th>
                    </tr>

                    <tr>
                        <th>Password</th>
                        <th width="150px">
                            <input type="text"/>
                        </th>
                    </tr>

                    <tr>
                        <th>Confirm Password</th>
                        <th width="150px">
                            <input type="text"/>
                        </th>
                    </tr>

                    <tr>
                        <th colspan="2" align="right">
                            <button>Register</button>
                        </th>
                    </tr>
                </tbody>
            </table>
        </form>
        <p>Already have an account? Log in <a href="login.html">here</a>!</p>
    </body>
</html>
