<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Profile Settings</title>
        <link rel="stylesheet" media="all" type="text/css" href="css/style.css"/>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <script src="js/nav_constructor.js" defer></script>
        <script src="js/profile_settings.js" defer></script>
    </head>
    <body>
        <nav></nav>

        <div class="main">
            <div>
                <h1>Profile Settings</h1>
                <div class="container">
                    <div class="picture">
                        <img src="https://media.tenor.com/Eu03ypsoM3gAAAAM/dog-tongue-out.gif" width="150px">
                        <button type="button" class="short">Change profile picture</button>
                            
                    </div>

                    <div class="info">
                        <form action="profile.html">
                            <table>
                                <tr>
                                    <th align="left" width="200px">Name</th>
                                    <th align="left">Name G. Oeshere</th>
                                </tr>
                                <tr>
                                    <th align="left" width="200px">College</th>
                                    <th align="left"><input type="text" size="30" value="College of Computer Studies"></th>
                                </tr>
                                <tr>
                                    <th align="left" width="200px">Program</th>
                                    <th align="left"><input type="text" size="30" value="BSCS-ST"></th>
                                </tr>
                                <tr>
                                    <th align="left" width="200px">Description</th>
                                    <th align="left"><input type="text" size="30" value="None"></th>
                                </tr>
                                <tr>
                                    <th colspan="2" align="right"><input type="submit" value="Save"></th>
                                </tr>
                            </table>
                        </form>
                        <!-- <p>Name: <span class="profile-edit">Name G. Oeshere</span></p>
                        <p>College: <span><input type="text" class="profile-edit"></span></p>
                        <p>Program: <span><input type="text" class="profile-edit"></span></p>
                        <p>Description: <span ><input type="text" class="profile-edit desc"></span></p> -->
                    </div>

                </div>
                <!-- <button type="button" class="short float-right">Save</button> -->
            </div>

            <div class="bottom-line"></div>

            <h1>Account Settings</h1>
            <div>
                <div>
                    <h2>Change Password</h2>
                    <p>Change the password of your account</p>
                    <a href="change_password.html">
                        <button type="button">
                            Change Password
                        </button>
                    </a>
                </div>

                <div>
                    <h2>Delete Account</h2>
                    <p class="warning">
                        WARNING! This deletes your account profile and data. Any reservations
                        done prior to deletion are cancelled when your account is deleted.
                    </p>
                    <a href="delete_account.html">
                        <button type="button" class="warning">
                            Delete Account
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </body>
</html>
