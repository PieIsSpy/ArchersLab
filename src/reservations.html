<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations</title>
    <link rel="stylesheet" media="all" type="text/css" href="css/style.css" />
    <script src="js/nav_constructor.js" defer></script>
    <script src="js/room_constructor.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

</head>

<body>
    <nav></nav>
    <!-- this is for students to reserve a slot -->
    <div class="main gapped aligned">
        <div class="container center aligned">
            <p>Room</p>

            <select class="room">
                <option>GK203</option>
            </select>

            <p>Day</p>

            <select class="day">
                <option>6/7/2026</option>
            </select>

            <p>Time</p>

            <select class="time">
                <option>7:00AM-7:30AM</option>
                <option>7:30AM-8:00AM</option>
                <option>8:00AM-8:30AM</option>
                <option>8:30AM-9:00AM</option>
                <option>9:00AM-9:30AM</option>
                <option>9:30AM-10:00AM</option>
                <option>10:00AM-10:30AM</option>
                <option>10:30AM-11:00AM</option>
                <option>11:00AM-11:30AM</option>
                <option>11:30AM-12:00PM</option>
                <option>12:00PM-12:30PM</option>
                <option>12:30PM-1:00PM</option>
                <option>1:00PM-1:30PM</option>
                <option>1:30PM-2:00PM</option>
                <option>2:00PM-2:30PM</option>
                <option>2:30PM-3:00PM</option>
                <option>3:00PM-3:30PM</option>
                <option>3:30PM-4:00PM</option>
                <option>4:00PM-4:30PM</option>
                <option>4:30PM-5:00PM</option>
                <option>5:00PM-5:30PM</option>
            </select>
        </div>

        <div class="container center">
            <div class="box" id="seat-list"></div>
            <div id="reserve-box">
                <div class="box" id="reserve-list-box">
                    <p class="seat-title">CONFIRMED RESERVATIONS</p>
                    <div id="reserve-list">

                    </div>
                </div>
            <button id="reserve" type="button">Reserve</button>
            </div> 
        </div>
        
    </div>
</body>

</html>
