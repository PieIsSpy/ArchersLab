<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard</title>
        <link rel="stylesheet" media="all" type="text/css" href="css/style.css"/>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <script src="js/nav_constructor.js" defer></script>

    </head>
    <body>
        <nav></nav>
        <div class="main" style ="color: #2A2420">
            <div>
                <br>
                <strong style = "font-size: xx-large;">Welcome! to Archer's Lab! Dr. Lawrence Belo Phoa </strong>
                <br>
                <strong id = "datetime"></strong>
            </div>
            <br>

            <div class = "box">
                <div class = "container">
                    <strong style = "font-size: xx-large;">Current reservations:</strong>
                </div>
                <br>

                <div class = "gapped col-flex container">
                    <table id = "reservationTable">

                    </table>
                </div>

            </div>
        </div>

        <script>
            //dummy variables for now...
            const reservation =
            [
            ["1/29", "10:00-12:00", "G404", "2/30", "1,3", "Ongoing"],
            ["1/30", "16:00-18:00", "G304a", "5/30", "1,2,3,4", "Ongoing"],
            ["2/1", "7:00-7:30", "G305a", "5/30", "1,2,3,4", "Ongoing"],
            ["2/4", "8:00-9:00", "G306a", "5/30", "1,4", "Ongoing"],
            ["2/12", "16:00-18:00", "G307a", "5/30", "11", "Ongoing"],
            ["2/15", "16:00-18:00", "G308a", "5/30", "3,4", "Ongoing"],
            ];

            //reservations[0][1][0]={name: "Ang, B.", date: "20260608", start_time: "1200", end_time: "1300"}



            function viewReservations(){
                const table = document.getElementById("reservationTable");
                
                headerTable = ["Date", "Time","Room","Capacity","Seats Taken","Status", "Actions"];

                const topRow = document.createElement("tr");

                for(let i = 0; i < headerTable.length; i++){
                    const th = document.createElement("th");
                    th.textContent = headerTable[i];
                    topRow.appendChild(th);

                }

                table.appendChild(topRow);


                for(let i = 0; i < reservation.length; i++){
                    const row = document.createElement("tr");
                    for(let j = 0; j < reservation[i].length; j++){
                        const td = document.createElement("td");
                        const div = document.createElement("div");
                        const buttonTd = document.createElement("td");

                        div.className = "cells";
                        div.textContent = reservation[i][j];
                        div.style = "color: black;";
                        td.appendChild(div);
                        row.appendChild(td);

                        if(j === reservation[i].length - 1){
                            const button = document.createElement("button");
                            button.textContent = "Cancel";
                            button.className = "cells";
                            button.style = "background-color: red; color: white";
                            button.onclick = () => deleteReservation(i);
                            buttonTd.appendChild(button);
                            row.appendChild(buttonTd);
                        }
                    }
                    table.appendChild(row);
                }
            }

            function deleteReservation(i){
                chosenReservation = "room " + reservation[i][2] + " - " + reservation[i][0] + " - " + reservation[i][1];
                if (confirm("Are you sure you want to cancel your reservation at " + chosenReservation + "?") == true) {
                    alert("Reservation at " + chosenReservation + " cancelled!")
                    reservation.splice(i,1);
                    document.getElementById("reservationTable").innerHTML = "";
                    viewReservations();
                } else {
                }


            }

            function showCurrentTime(){
                var today = new Date();
                var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                var week = days[today.getDay()];
                var month = months[today.getMonth()];
                var date = today.getDate();
                var time = today.toLocaleTimeString();

                document.getElementById("datetime").innerHTML =
                "Today is currently " + week + ", " + month + " " + date + "  -  " + time;
            }
            showCurrentTime();
            setInterval(showCurrentTime, 1000);
            viewReservations();

        </script>
    </body>
</html>
