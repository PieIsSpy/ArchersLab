<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link rel="stylesheet" media="all" type="text/css" href="css/style.css" />
    <link rel="stylesheet" media="all" type="text/css" href="css/profile.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <script src="js/nav_constructor.js" defer></script>
</head>

<body>
    <nav></nav>

    <div class="main">
        <div class="page-header">
            <h1>Check Profile</h1>
        </div>

        <div class="dashboard-grid">

            <div class="profile-card" id="profile-card-container">
                <div class="profile-header-centered">
                    <img src="https://i.redd.it/w3c2by4oacjf1.png" alt="Profile Picture"
                        class="profile-pic">
                    <div class="header-text">
                        <h2>John Lorens Tee</h2>
                        <span>"Lorens"</span>
                    </div>
                </div>

                <div class="profile-details-list">
                    <div class="detail-row">
                        <span class="label">Student ID</span>
                        <span class="value">12412449</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Email</span>
                        <span class="value">john_lorens_tee@dlsu.edu.ph</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">College</span>
                        <span class="value">College of Computer Studies</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Course</span>
                        <span class="value">Bachelor of Science in Computer Science</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">About</span>
                        <p class="value">Hello! I am 2nd year student passionate about coding!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
