<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Delete Account</title>
        <link rel="stylesheet" media="all" type="text/css" href="css/style.css"/>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <script src="js/nav_constructor.js" defer></script>

    <body>
        <nav></nav>

        <div class="main">
            <h1>Delete Account</h1>
            <p class="warning">
                WARNING! This deletes your account profile and data. Any reservations
                done prior to deletion are cancelled when your account is deleted.
            </p>
            <div class="container col-flex center aligned">
                <form>
                    <table>
                        <tr>
                            <th align="left">Password</th>
                            <th width="150px">
                                <input type="text"/>
                            </th>
                        </tr>

                        <tr>
                            <th align="left">Confirm Password</th>
                            <th width="150px">
                                <input type="text"/>
                            </th>
                        </tr>

                        <tr>
                            <th colspan="2" align="right">
                                <input type="submit" value="submit">
                            </th>
                        </tr>
                    </table>
                </form>
            </div>
        </div>
    </body>
</html>
